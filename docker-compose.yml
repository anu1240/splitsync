version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: splitsync-db
    restart: always
    environment:
      POSTGRES_DB: splitsync
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: splitsync-backend
    restart: always
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: splitsync
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: 5000
    ports:
      - "5000:5000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://${EC2_PUBLIC_IP:-localhost}:5000
    container_name: splitsync-frontend
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  pgdata:
